<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Un nouveau chapitre</title>
  <link rel="icon" type="image/jpeg" href="./Apres%20compteur/assets/Kitsune_Favicon.jpg" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase-config.js?v=2"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f8fafc;
      color: #222;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      max-width: 980px;
      width: 100%;
      background: white;
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
    }

    h1 {
      margin: 0 0 12px;
      color: #7c3aed;
      font-size: 32px;
      text-align: center;
    }

    .intro {
      margin: 0 0 24px;
      color: #4b5563;
      line-height: 1.7;
      font-size: 16px;
      text-align: center;
    }

    .countdown {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .time-box {
      min-width: 90px;
      background: #f5f3ff;
      border: 1px solid #ddd6fe;
      border-radius: 12px;
      padding: 12px 10px;
      text-align: center;
    }

    .time-box strong {
      display: block;
      font-size: 24px;
      color: #7c3aed;
    }

    .time-box span {
      font-size: 12px;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .message {
      margin: 0 0 24px;
      padding: 16px 18px;
      border-radius: 14px;
      background: #faf5ff;
      border: 1px solid #e9d5ff;
      color: #6b21a8;
      text-align: center;
      font-size: 16px;
      line-height: 1.7;
    }

    .content-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 8px;
    }

    .panel {
      background: #faf7ff;
      border: 1px solid #ede9fe;
      border-radius: 16px;
      padding: 16px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 8px;
      color: #4338ca;
    }

    textarea,
    input {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #d8b4fe;
      border-radius: 10px;
      padding: 10px 12px;
      font: inherit;
      resize: vertical;
    }

    textarea {
      min-height: 100px;
    }

    input {
      min-height: 44px;
    }

    .preview {
      margin-top: 10px;
      padding: 12px;
      border-radius: 10px;
      background: white;
      color: #374151;
      line-height: 1.6;
      min-height: 80px;
      border: 1px dashed #c4b5fd;
      white-space: pre-wrap;
    }

    .support-actions {
      margin-top: 10px;
      display: flex;
      justify-content: flex-end;
    }

    .compose-status {
      margin-top: 8px;
      min-height: 20px;
      font-size: 13px;
      color: #6b7280;
    }

    .auth-box {
      margin-top: 12px;
      margin-bottom: 12px;
      padding: 12px;
      border-radius: 10px;
      background: #fff;
      border: 1px solid #ddd6fe;
    }

    .auth-status {
      margin: 0 0 10px;
      color: #4b5563;
      font-size: 14px;
    }

    .auth-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .auth-btn {
      border: 1px solid #d1d5db;
      background: #fff;
      color: #111827;
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .auth-btn:hover {
      background: #f9fafb;
    }

    .auth-btn-google,
    .auth-btn-twitch {
      border-color: #d6e2ff;
      background: #f8fbff;
    }

    .auth-logo {
      width: 18px;
      height: 18px;
      display: inline-block;
      border-radius: 4px;
      flex: 0 0 auto;
      object-fit: contain;
      background: #fff;
    }

    .support-btn {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      background: #7c3aed;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
    }

    .support-btn:hover {
      background: #6d28d9;
    }

    .messages-list {
      margin-top: 12px;
      display: grid;
      gap: 10px;
      max-height: 240px;
      overflow: auto;
      padding-right: 4px;
    }

    .message-item {
      background: #fff;
      border: 1px solid #ddd6fe;
      border-radius: 10px;
      padding: 10px 12px;
    }

    .message-item p {
      margin: 0 0 6px;
      color: #374151;
      white-space: pre-wrap;
      line-height: 1.5;
    }

    .message-meta {
      margin: 0;
      color: #6b7280;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .message-meta span {
      color: #6b7280;
    }

    .message-meta,
    .message-meta *,
    .message-author,
    .message-author * {
      color: #6b7280 !important;
    }

    .auth-status,
    .compose-status {
      color: #4b5563 !important;
    }

    .message-author {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #4b5563;
      font-weight: 600;
    }

    .provider-logo {
      width: 14px;
      height: 14px;
      display: inline-block;
      border-radius: 3px;
      object-fit: contain;
      background: #fff;
    }

    .empty-state {
      margin: 0;
      color: #6b7280;
      font-size: 14px;
      background: #fff;
      border: 1px dashed #d8b4fe;
      border-radius: 10px;
      padding: 10px 12px;
    }

    .video-frame {
      margin-top: 10px;
      min-height: 220px;
      border-radius: 12px;
      overflow: hidden;
      background: #e9d5ff;
      display: grid;
      place-items: center;
      color: #6b21a8;
      padding: 12px;
      text-align: center;
    }

    .video-card {
      width: 100%;
      background: white;
      border-radius: 12px;
      padding: 12px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.08);
    }

    .video-card p {
      margin: 0 0 8px;
      font-weight: bold;
      color: #6d28d9;
    }

    .video-card video {
      width: 100%;
      border-radius: 10px;
      display: block;
      background: #000;
    }

    .video-frame iframe {
      width: 100%;
      height: 100%;
      min-height: 220px;
      border: 0;
      border-radius: 12px;
    }

    .btn {
      display: inline-block;
      margin-top: 18px;
      text-decoration: none;
      padding: 12px 16px;
      border-radius: 999px;
      font-weight: bold;
      background: #ec4899;
      color: white;
    }

    .btn:hover {
      background: #db2777;
    }

    .btn-disabled {
      pointer-events: none;
      opacity: 0.7;
      cursor: default;
    }

    .bg-img {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 0.8;
      pointer-events: none;
      overflow: hidden;
    }

    .bg-img::before,
    .bg-img::after {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      width: 22%;
      background-image: url('Apres compteur/assets/sakura Flower.jpg');
      background-size: cover;
      background-position: center;
      filter: saturate(1) contrast(1) opacity(0.95);
      pointer-events: none;
    }

    .bg-img::before {
      left: 0;
    }

    .bg-img::after {
      right: 0;
    }

    .sakura {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.95) 0 4px, transparent 5px),
        radial-gradient(circle at 75% 25%, rgba(255,182,193,0.8) 0 3px, transparent 4px),
        radial-gradient(circle at 40% 75%, rgba(255,255,255,0.9) 0 3px, transparent 4px);
      background-size: 220px 220px, 180px 180px, 200px 200px;
      opacity: 0.9;
      z-index: 1;
      mix-blend-mode: screen;
    }

    .card {
      position: relative;
      z-index: 2;
    }

    @media (max-width: 768px) {
      body {
        padding: 12px;
      }

      .card {
        padding: 18px;
      }

      .content-grid {
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .video-panel {
        padding: 10px;
      }

      .video-frame {
        min-height: 420px;
        padding: 8px;
      }

      .video-card {
        padding: 8px;
      }

      .video-card video {
        min-height: 320px;
        max-height: 72vh;
        object-fit: cover;
      }
    }

  </style>
</head>
<body>
  <div id="bgImg" class="bg-img" aria-hidden="true"></div>
  <div class="sakura"></div>
  <div class="card">
    <h1>Un nouveau chapitre</h1>
    <p class="intro">Merci pour votre soutien et votre présence.</p>
    <p class="message">Merci pour votre présence.<br>Un nouveau chapitre s’ouvre avec tout mon amour.</p>

    <div class="countdown" aria-label="Compte à rebours">
      <div class="time-box"><strong id="days">00</strong><span>Jours</span></div>
      <div class="time-box"><strong id="hours">00</strong><span>Heures</span></div>
      <div class="time-box"><strong id="minutes">00</strong><span>Minutes</span></div>
      <div class="time-box"><strong id="seconds">00</strong><span>Secondes</span></div>
    </div>

    <div class="content-grid">
      <div class="panel">
        <div id="authBox" class="auth-box"></div>
        <label for="customText">Laisse un message de soutien et d'amour</label>
        <textarea id="customText" placeholder="Ecris ici ton message de soutien..." disabled></textarea>
        <div id="textPreview" class="preview" aria-live="polite">Aperçu de ton message...</div>
        <div class="support-actions">
          <button id="publishMessage" type="button" class="support-btn" disabled>Publier le message</button>
        </div>
        <div id="composeStatus" class="compose-status" aria-live="polite"></div>
        <div id="messagesList" class="messages-list" aria-live="polite"></div>
      </div>

      <div class="panel video-panel">
        <div id="videoFrame" class="video-frame">
          <div class="video-card">
            <p>Mon aventure</p>
            <video controls preload="metadata" playsinline controlslist="nodownload noplaybackrate nofullscreen" disablepictureinpicture disableremoteplayback oncontextmenu="return false;" ondragstart="return false;">
              <source src="Apres compteur/tout%20les%20models.mp4?v=2" type="video/mp4" />
              Votre navigateur ne prend pas en charge la lecture de vidéos.
            </video>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script>
    const canonicalBeforePath = window.location.protocol === 'file:' ? '/avant-compteur.html' : window.location.pathname;
    const productionOrigin = 'https://miyuyume.edgeone.dev';
    const appOrigin = window.location.protocol === 'file:' ? productionOrigin : window.location.origin;
    const forcedCachePurgeVersion = 'v4';
    const forcedCachePurgeKey = `redebut-forced-cache-purge-${forcedCachePurgeVersion}`;
    const initialHash = window.location.hash.startsWith('#') ? window.location.hash.slice(1) : '';
    const initialSearch = new URLSearchParams(window.location.search);
    const hasOAuthCallbackOnLoad = Boolean(
      initialHash.includes('access_token=')
      || initialHash.includes('error=')
      || initialSearch.has('code')
      || initialSearch.has('error')
    );
    if (!window.localStorage.getItem(forcedCachePurgeKey)) {
      const keysToClear = [
        'redebut-countdown-target-date-shared',
        'redebut-countdown-reset-version-shared',
        'redebut-countdown-duration-ms-shared',
        'redebut-messages-round-start-ms-v1',
        'redebut-auth-user-v2',
        'redebut-support-messages-v2',
        'redebut-support-messages-v3'
      ];

      if (!hasOAuthCallbackOnLoad) {
        keysToClear.push('redebut-oauth-flow-v2', 'redebut-oauth-pending-v1');
      }

      keysToClear.forEach((key) => window.localStorage.removeItem(key));
      window.localStorage.setItem(forcedCachePurgeKey, String(Date.now()));
    }

    const countdownConfigUrls = [
      './countdown-config.json',
      '/Redebut/countdown-config.json',
      '/countdown-config.json'
    ];
    const oauthPendingStorageKey = 'redebut-oauth-pending-v1';
    const countdownStorageKey = 'redebut-countdown-target-date-shared';
    const countdownVersionStorageKey = 'redebut-countdown-reset-version-shared';
    const countdownDurationStorageKey = 'redebut-countdown-duration-ms-shared';
    const nextPageHref = 'Apres compteur/Redebut.html';
    let countdownResetVersion = 'v12';
    const storedDurationMs = Number(window.localStorage.getItem(countdownDurationStorageKey) || '0');
    let countdownDurationMs = Number.isFinite(storedDurationMs) && storedDurationMs > 0
      ? storedDurationMs
      : 60 * 60 * 1000;
    let serverTimeOffsetMs = 0;
    const storedTargetDate = window.localStorage.getItem(countdownStorageKey);
    const parsedStoredTargetMs = storedTargetDate ? new Date(storedTargetDate).getTime() : NaN;
    const hasUsableStoredTarget = Number.isFinite(parsedStoredTargetMs) && parsedStoredTargetMs > Date.now();
    let targetDate = hasUsableStoredTarget ? new Date(parsedStoredTargetMs) : new Date(Date.now() + countdownDurationMs);
    let canAutoRedirect = false;

    let countdownIntervalId = null;

    function updateCountdown() {
      const now = Date.now() + serverTimeOffsetMs;
      const distance = targetDate.getTime() - now;

      if (distance <= 0) {
        if (isOAuthPending()) {
          const safeTargetDate = new Date(Date.now() + countdownDurationMs);
          targetDate = safeTargetDate;
          window.localStorage.setItem(countdownStorageKey, safeTargetDate.toISOString());
        }

        const recoveredDistance = targetDate.getTime() - now;
        if (recoveredDistance > 0) {
          const days = Math.floor(recoveredDistance / (1000 * 60 * 60 * 24));
          const hours = Math.floor((recoveredDistance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
          const minutes = Math.floor((recoveredDistance % (1000 * 60 * 60)) / (1000 * 60));
          const seconds = Math.floor((recoveredDistance % (1000 * 60)) / 1000);

          document.getElementById('days').textContent = String(days).padStart(2, '0');
          document.getElementById('hours').textContent = String(hours).padStart(2, '0');
          document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
          document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
          return;
        }

        document.getElementById('days').textContent = '00';
        document.getElementById('hours').textContent = '00';
        document.getElementById('minutes').textContent = '00';
        document.getElementById('seconds').textContent = '00';

        if (canAutoRedirect && !window.__redirected) {
          window.__redirected = true;
          window.location.href = nextPageHref;
        }
        return;
      }

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      document.getElementById('days').textContent = String(days).padStart(2, '0');
      document.getElementById('hours').textContent = String(hours).padStart(2, '0');
      document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
      document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
    }

    updateCountdown();
    countdownIntervalId = window.setInterval(updateCountdown, 1000);
    window.setInterval(() => {
      loadSharedCountdownConfig().catch(() => {
        // Keep current countdown state if periodic config check fails.
      });
    }, 5000);

    async function loadSharedCountdownConfig() {
      let loadedFromRemoteConfig = false;

      try {
        let config = null;
        for (const configUrl of countdownConfigUrls) {
          try {
            const response = await fetch(`${configUrl}?t=${Date.now()}`, { cache: 'no-store' });
            if (!response.ok) {
              continue;
            }

            const serverDateHeader = response.headers.get('date');
            const serverNowMs = serverDateHeader ? new Date(serverDateHeader).getTime() : NaN;
            if (Number.isFinite(serverNowMs)) {
              serverTimeOffsetMs = serverNowMs - Date.now();
            }

            const candidate = await response.json();
            if (candidate && candidate.targetDate) {
              config = candidate;
              loadedFromRemoteConfig = true;
              break;
            }
          } catch (e) {
            // Try next possible config path.
          }
        }

        if (!config || !config.targetDate) {
          return;
        }

        const configResetVersion = config.resetVersion || countdownResetVersion;
        const previousResetVersion = window.localStorage.getItem(countdownVersionStorageKey);
        countdownDurationMs = Number(config.durationMs) || countdownDurationMs;
        window.localStorage.setItem(countdownDurationStorageKey, String(countdownDurationMs));
        const sharedTargetDate = new Date(config.targetDate);
        const sharedTargetMs = sharedTargetDate.getTime();
        const computedRoundStartMs = Number.isFinite(sharedTargetMs) ? (sharedTargetMs - countdownDurationMs) : NaN;
        if (Number.isFinite(computedRoundStartMs) && computedRoundStartMs > 0) {
          const nextRoundStartMs = computedRoundStartMs;
          messagesRoundStartMs = nextRoundStartMs;
          window.localStorage.setItem(messagesRoundStartStorageKey, String(messagesRoundStartMs));
        }

        countdownResetVersion = configResetVersion;
        window.localStorage.setItem(countdownStorageKey, config.targetDate);
        window.localStorage.setItem(countdownVersionStorageKey, countdownResetVersion);

        if (previousResetVersion && previousResetVersion !== configResetVersion) {
          const cacheKeysToClear = [
            supportMessagesStorageKey,
            'redebut-support-messages-v2',
            'redebut-support-messages-v3',
            messagesRoundStartStorageKey,
            countdownStorageKey,
            countdownVersionStorageKey,
            countdownDurationStorageKey,
            lastPublishStorageKey
          ];
          cacheKeysToClear.forEach((key) => window.localStorage.removeItem(key));
          try {
            window.sessionStorage.removeItem(oauthPendingStorageKey);
            window.sessionStorage.removeItem(oauthFlowStateKey);
          } catch (e) {
            // Ignore session storage cleanup errors.
          }

          window.localStorage.setItem(countdownStorageKey, config.targetDate);
          window.localStorage.setItem(countdownVersionStorageKey, countdownResetVersion);
          window.localStorage.setItem(countdownDurationStorageKey, String(countdownDurationMs));

          supportMessages = [];
          cloudDisabledForSession = false;
          renderSupportMessages();
        }

        window.__redirected = false;
        targetDate = new Date(config.targetDate);
        updateCountdown();
      } catch (e) {
        // keep the last known local target date if the shared file is unavailable
      } finally {
        // Self-heal expired local target if config cannot be reached in production.
        if (!loadedFromRemoteConfig) {
          const localTargetRaw = window.localStorage.getItem(countdownStorageKey);
          const localTargetMs = localTargetRaw ? new Date(localTargetRaw).getTime() : NaN;
          const isLocalMissingOrExpired = !Number.isFinite(localTargetMs) || localTargetMs <= Date.now();

          if (isLocalMissingOrExpired) {
            const fallbackTargetDate = new Date(Date.now() + countdownDurationMs);
            targetDate = fallbackTargetDate;
            window.localStorage.setItem(countdownStorageKey, fallbackTargetDate.toISOString());
            window.localStorage.setItem(countdownVersionStorageKey, countdownResetVersion);
            window.__redirected = false;
            updateCountdown();
          }
        }
      }
    }

    const textArea = document.getElementById('customText');
    const textPreview = document.getElementById('textPreview');
    const publishMessageBtn = document.getElementById('publishMessage');
    const composeStatus = document.getElementById('composeStatus');
    const messagesList = document.getElementById('messagesList');
    const supportMessagesVersion = 'v3';
    const supportMessagesStorageKey = `redebut-support-messages-${supportMessagesVersion}`;
    const messagesRoundStartStorageKey = 'redebut-messages-round-start-ms-v1';
    const lastPublishStorageKey = 'redebut-last-publish-at-v1';
    const authStorageKey = 'redebut-auth-user-v2';
    const authBox = document.getElementById('authBox');
    const oauthFlowStateKey = 'redebut-oauth-flow-v2';
    const supportMessagesChannel = 'BroadcastChannel' in window ? new BroadcastChannel('redebut-support-messages-sync') : null;
    const runtimeSupabaseConfig = window.REDEBUT_SUPABASE_CONFIG || {};
    const configuredCooldownSeconds = Number(runtimeSupabaseConfig.publishCooldownSeconds);
    const configuredMaxMessages = Number(runtimeSupabaseConfig.maxMessages);
    const configuredSyncPollSeconds = Number(runtimeSupabaseConfig.syncPollSeconds);
    const publishCooldownMs = Number.isFinite(configuredCooldownSeconds) && configuredCooldownSeconds > 0
      ? Math.round(configuredCooldownSeconds * 1000)
      : 8000;
    const maxMessages = Number.isFinite(configuredMaxMessages) && configuredMaxMessages > 0
      ? Math.round(configuredMaxMessages)
      : 100;
    const syncPollMs = Number.isFinite(configuredSyncPollSeconds) && configuredSyncPollSeconds > 0
      ? Math.round(configuredSyncPollSeconds * 1000)
      : 5000;
    const supabaseConfig = {
      // Optional realtime sync across devices.
      // Fill these 2 values to enable shared live messages on phone + PC.
      url: runtimeSupabaseConfig.url || '',
      anonKey: runtimeSupabaseConfig.anonKey || '',
      table: runtimeSupabaseConfig.table || 'support_messages',
      channel: 'redebut-support-messages-live-v1'
    };
    const hasCloudConfig = Boolean(supabaseConfig.url && supabaseConfig.anonKey);

    let supportMessages = [];
    let messagesRoundStartMs = Number(window.localStorage.getItem(messagesRoundStartStorageKey) || '0');
    let supabaseClient = null;
    let isRealtimeEnabled = false;
    let isCloudSyncEnabled = false;
    let cloudDisabledForSession = false;
    let messagesSyncIntervalId = null;
    let authUser = null;
    let authStatus = null;
    let googleLogin = null;
    let twitchLogin = null;
    let logoutBtn = null;
    const oauthConfig = {
      googleClientId: '691290989737-hljsc29mhbk1kbcjjb7seiu0fderb0ev.apps.googleusercontent.com',
      twitchClientId: '28pgpqe8sa8y0iowuipn2nggqda24q',
      googleRedirectUri: `${productionOrigin}${canonicalBeforePath}`,
      twitchRedirectUri: `${productionOrigin}${canonicalBeforePath}`
    };
    const defaultFaviconHref = './Apres%20compteur/assets/Kitsune_Favicon.jpg';
    const providerFaviconMap = {
      google: 'https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg',
      twitch: 'https://www.twitch.tv/favicon.ico'
    };

    function normalizeProvider(providerRaw) {
      return String(providerRaw || '').trim().toLowerCase();
    }

    function setPageFavicon(href) {
      const targetHref = href || defaultFaviconHref;
      let favicon = document.querySelector("link[rel='icon']");

      if (!favicon) {
        favicon = document.createElement('link');
        favicon.rel = 'icon';
        document.head.appendChild(favicon);
      }

      favicon.href = targetHref;
    }

    function getPendingProvider() {
      try {
        const rawPending = window.localStorage.getItem(oauthPendingStorageKey) || window.sessionStorage.getItem(oauthPendingStorageKey);
        if (!rawPending) {
          return '';
        }

        const parsed = JSON.parse(rawPending);
        return normalizeProvider(parsed && parsed.provider);
      } catch (e) {
        return '';
      }
    }

    function syncFaviconWithAuthState() {
      // Keep the brand favicon fixed across Google/Twitch auth flows.
      setPageFavicon(defaultFaviconHref);
    }

    function ensureValidAuthOrigin() {
      const isFileOrigin = window.location.protocol === 'file:';

      if (!isFileOrigin) {
        return true;
      }

      const destination = `${productionOrigin}${canonicalBeforePath}`;
      showAuthNotice(`Connexion OAuth disponible uniquement sur ${destination}`);
      window.location.href = destination;
      return false;
    }

    function getOAuthFlowState() {
      try {
        const rawFlow = window.localStorage.getItem(oauthFlowStateKey);
        if (rawFlow) {
          return JSON.parse(rawFlow);
        }

        const rawSessionFlow = window.sessionStorage.getItem(oauthFlowStateKey);
        return rawSessionFlow ? JSON.parse(rawSessionFlow) : null;
      } catch (e) {
        return null;
      }
    }

    function setOAuthFlowState(flow) {
      const serializedFlow = JSON.stringify(flow);

      try {
        window.localStorage.setItem(oauthFlowStateKey, serializedFlow);
      } catch (e) {
        // Fallback for restrictive browser storage modes.
      }

      try {
        window.sessionStorage.setItem(oauthFlowStateKey, serializedFlow);
      } catch (e) {
        // Keep OAuth usable even if session storage is restricted.
      }
    }

    function clearOAuthFlowState() {
      try {
        window.localStorage.removeItem(oauthFlowStateKey);
      } catch (e) {
        // Ignore storage cleanup errors.
      }

      try {
        window.sessionStorage.removeItem(oauthFlowStateKey);
      } catch (e) {
        // Ignore storage cleanup errors.
      }
    }

    function setOAuthPending(provider) {
      const payload = JSON.stringify({
        provider,
        startedAt: Date.now()
      });

      try {
        window.localStorage.setItem(oauthPendingStorageKey, payload);
      } catch (e) {
        // Fallback for restrictive storage modes.
      }

      try {
        window.sessionStorage.setItem(oauthPendingStorageKey, payload);
      } catch (e) {
        // Keep OAuth flow usable if session storage is restricted.
      }

      syncFaviconWithAuthState();
    }

    function clearOAuthPending() {
      try {
        window.localStorage.removeItem(oauthPendingStorageKey);
      } catch (e) {
        // Ignore storage cleanup errors.
      }

      try {
        window.sessionStorage.removeItem(oauthPendingStorageKey);
      } catch (e) {
        // Ignore storage cleanup errors.
      }

      syncFaviconWithAuthState();
    }

    function isOAuthPending() {
      try {
        const rawPending = window.localStorage.getItem(oauthPendingStorageKey);
        const rawSessionPending = window.sessionStorage.getItem(oauthPendingStorageKey);
        const rawValue = rawPending || rawSessionPending;
        if (!rawValue) {
          return false;
        }

        const pending = JSON.parse(rawValue);
        const startedAt = Number(pending && pending.startedAt);
        const maxPendingWindowMs = 15 * 60 * 1000;

        if (!Number.isFinite(startedAt) || Date.now() - startedAt > maxPendingWindowMs) {
          clearOAuthPending();
          return false;
        }

        return true;
      } catch (e) {
        clearOAuthPending();
        return false;
      }
    }

    try {
      const storedUser = window.localStorage.getItem(authStorageKey);
      authUser = storedUser ? JSON.parse(storedUser) : null;
      if (authUser && (typeof authUser !== 'object' || !authUser.name || !authUser.provider)) {
        authUser = null;
        window.localStorage.removeItem(authStorageKey);
      }
    } catch (e) {
      authUser = null;
      window.localStorage.removeItem(authStorageKey);
    }

    syncFaviconWithAuthState();

    function isAuthenticated() {
      return Boolean(authUser && authUser.name && authUser.provider);
    }

    function setAuthUser(user) {
      authUser = user;
      if (user) {
        window.localStorage.setItem(authStorageKey, JSON.stringify(user));
      } else {
        window.localStorage.removeItem(authStorageKey);
      }
      syncFaviconWithAuthState();
      updateAuthUi();
      refreshText();

      if (user && isCloudSyncEnabled) {
        pullSupportMessagesFromSupabase().catch(() => {
          // Keep current messages if immediate post-login refresh fails.
        });
      }
    }

    function renderAuthBox() {
      if (isAuthenticated()) {
        authBox.innerHTML = `
          <div class="auth-actions">
            <button id="logoutBtn" type="button" class="auth-btn">Se deconnecter</button>
          </div>
        `;
      } else {
        authBox.innerHTML = `
          <p id="authStatus" class="auth-status" aria-live="polite"></p>
          <div class="auth-actions">
            <button id="googleLogin" type="button" class="auth-btn auth-btn-google"><img class="auth-logo" src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="" aria-hidden="true" />Connexion Google</button>
            <button id="twitchLogin" type="button" class="auth-btn auth-btn-google"><img class="auth-logo" src="https://www.twitch.tv/favicon.ico" alt="" aria-hidden="true" />Connexion Twitch</button>
          </div>
        `;
      }

      authStatus = document.getElementById('authStatus');
      googleLogin = document.getElementById('googleLogin');
      twitchLogin = document.getElementById('twitchLogin');
      logoutBtn = document.getElementById('logoutBtn');

      if (googleLogin) googleLogin.onclick = startGoogleLogin;
      if (twitchLogin) twitchLogin.onclick = startTwitchLogin;
      if (logoutBtn) {
        logoutBtn.onclick = () => {
          setAuthUser(null);
          updateAuthUi();
        };
      }
    }

    function updateAuthUi() {
      const connected = isAuthenticated();
      renderAuthBox();
      textArea.disabled = !connected;
      publishMessageBtn.disabled = !connected;
      if (!connected) {
        showComposeNotice('Connecte-toi pour publier un message.');
      }
    }

    function showAuthNotice(message) {
      if (authStatus) {
        authStatus.textContent = message;
      }
    }

    function showComposeNotice(message) {
      if (composeStatus) {
        const isMobile = window.matchMedia('(max-width: 768px)').matches;
        const isSupabaseMention = /supabase|temps reel|mode local actif|synchro telephone \+ pc/i.test(message || '');
        composeStatus.textContent = isMobile && isSupabaseMention ? '' : message;
      }
    }

    async function supabaseRestRequest(path, options = {}) {
      if (cloudDisabledForSession) {
        throw new Error('cloud_disabled_for_session');
      }

      const looksLikeJwt = (supabaseConfig.anonKey || '').split('.').length === 3;
      const headers = {
        apikey: supabaseConfig.anonKey,
        'Content-Type': 'application/json',
        ...(options.headers || {})
      };

      if (looksLikeJwt) {
        headers.Authorization = `Bearer ${supabaseConfig.anonKey}`;
      }

      const response = await fetch(`${supabaseConfig.url}${path}`, {
        method: options.method || 'GET',
        headers,
        body: options.body
      });

      if (!response.ok) {
        if (response.status === 404) {
          cloudDisabledForSession = true;
          isCloudSyncEnabled = false;
          isRealtimeEnabled = false;
          supabaseClient = null;
          showComposeNotice(`Cloud indisponible: table ${supabaseConfig.table} introuvable.`);
        }
        throw new Error(`supabase_rest_error_${response.status}`);
      }

      if (response.status === 204) {
        return null;
      }

      return response.json();
    }

    function createOauthState() {
      return Math.random().toString(36).slice(2) + Date.now().toString(36);
    }

    function buildQuery(params) {
      return new URLSearchParams(params).toString();
    }

    async function consumeOAuthCallbackPayload(hashPayload, hasQueryOAuth) {
      if (hashPayload) {
        const normalizedHash = hashPayload.startsWith('#') ? hashPayload.slice(1) : hashPayload;
        if (await completeOAuthFromHash(normalizedHash)) {
          clearOAuthParamsFromUrl();
        }
      } else if (hasQueryOAuth) {
        showAuthNotice('Connexion en cours, retour OAuth detecte.');
        clearOAuthPending();
        clearOAuthParamsFromUrl();
      }

      try {
        await loadSharedCountdownConfig();
      } catch (e) {
        // Keep current countdown state if callback-time config refresh fails.
      }

      if (isCloudSyncEnabled) {
        try {
          await pullSupportMessagesFromSupabase();
        } catch (e) {
          // Keep current UI state if immediate post-login sync fails.
        }
      }

      updateCountdown();
    }

    function relayOAuthCallbackToOpenerIfNeeded(hashPayload, hasQueryOAuth) {
      if (!window.opener || (!hashPayload && !hasQueryOAuth)) {
        return false;
      }

      try {
        window.opener.postMessage({
          type: 'redebut-oauth-callback',
          hash: hashPayload || '',
          search: window.location.search || ''
        }, '*');
      } catch (e) {
        return false;
      }

      window.setTimeout(() => {
        window.close();
      }, 30);
      return true;
    }

    window.addEventListener('message', (event) => {
      const payload = event.data;
      if (!payload || payload.type !== 'redebut-oauth-callback') {
        return;
      }

      const incomingHash = typeof payload.hash === 'string' ? payload.hash : '';
      const incomingSearch = new URLSearchParams(typeof payload.search === 'string' ? payload.search : '');
      const hasQueryOAuth = incomingSearch.has('code') || incomingSearch.has('error');

      consumeOAuthCallbackPayload(incomingHash, hasQueryOAuth).catch(() => {
        showAuthNotice('Retour de connexion detecte mais incomplet.');
      });
    });

    async function completeOAuthFromHash(hash) {
      const hashParams = new URLSearchParams(hash);
      const accessToken = hashParams.get('access_token');
      const returnedState = hashParams.get('state');
      const oauthError = hashParams.get('error');

      if (!accessToken && !oauthError) {
        return false;
      }

      const flow = getOAuthFlowState();
      clearOAuthFlowState();
      clearOAuthPending();

      if (oauthError) {
        showAuthNotice('Connexion annulee ou refusee.');
        return true;
      }

      if (!flow || flow.state !== returnedState) {
        showAuthNotice('Connexion impossible: etat OAuth invalide.');
        return true;
      }

      try {
        if (flow.provider === 'google') {
          const user = await fetchGoogleProfile(accessToken);
          setAuthUser(user);
          showAuthNotice('');
        } else if (flow.provider === 'twitch') {
          const user = await fetchTwitchProfile(accessToken);
          setAuthUser(user);
          showAuthNotice('');
        }
      } catch (e) {
        showAuthNotice('Connexion impossible, reessaie ou verifie la configuration du compte.');
      } finally {
        updateAuthUi();
      }

      return true;
    }

    function clearOAuthParamsFromUrl() {
      const cleanUrl = `${window.location.pathname}${window.location.search}`;
      window.history.replaceState({}, document.title, cleanUrl);
    }

    async function fetchGoogleProfile(accessToken) {
      const response = await fetch('https://openidconnect.googleapis.com/v1/userinfo', {
        headers: { Authorization: `Bearer ${accessToken}` }
      });
      if (!response.ok) throw new Error('google_profile_error');
      const data = await response.json();
      return {
        provider: 'Google',
        name: data.name || data.email || 'Utilisateur Google'
      };
    }

    async function fetchTwitchProfile(accessToken) {
      const response = await fetch('https://api.twitch.tv/helix/users', {
        headers: {
          Authorization: `Bearer ${accessToken}`,
          'Client-Id': oauthConfig.twitchClientId
        }
      });
      if (!response.ok) throw new Error('twitch_profile_error');
      const data = await response.json();
      const user = data.data && data.data[0] ? data.data[0] : null;
      return {
        provider: 'Twitch',
        name: user && user.display_name ? user.display_name : 'Utilisateur Twitch'
      };
    }

    function startGoogleLogin() {
      if (!oauthConfig.googleClientId) {
        showAuthNotice('Connexion indisponible.');
        return;
      }

      if (!ensureValidAuthOrigin()) {
        return;
      }

      if (window.google && window.google.accounts && window.google.accounts.oauth2) {
        setOAuthPending('google');
        const tokenClient = window.google.accounts.oauth2.initTokenClient({
          client_id: oauthConfig.googleClientId,
          scope: 'openid profile email',
          prompt: 'select_account',
          callback: async (response) => {
            if (!response || !response.access_token) {
              clearOAuthPending();
              showAuthNotice('Connexion annulee.');
              return;
            }

            try {
              const user = await fetchGoogleProfile(response.access_token);
              setAuthUser(user);
              showAuthNotice('');
            } catch (e) {
              showAuthNotice('Connexion impossible.');
            } finally {
              clearOAuthPending();
            }
          },
          error_callback: () => {
            clearOAuthPending();
            showAuthNotice('Connexion impossible.');
          }
        });

        tokenClient.requestAccessToken();
        return;
      }

      const state = createOauthState();
      setOAuthPending('google');
      setOAuthFlowState({
        provider: 'google',
        state,
        returnPath: canonicalBeforePath
      });
      const url = `https://accounts.google.com/o/oauth2/v2/auth?${buildQuery({
        client_id: oauthConfig.googleClientId,
        redirect_uri: oauthConfig.googleRedirectUri,
        response_type: 'token',
        scope: 'openid profile email',
        prompt: 'select_account',
        state
      })}`;
      showAuthNotice('Connexion en cours...');
      window.location.href = url;
    }

    function startTwitchLogin() {
      if (!oauthConfig.twitchClientId) {
        showAuthNotice('Connexion indisponible.');
        return;
      }

      if (!ensureValidAuthOrigin()) {
        return;
      }

      const state = createOauthState();
      setOAuthPending('twitch');
      setOAuthFlowState({
        provider: 'twitch',
        state,
        returnPath: canonicalBeforePath
      });
      const url = `https://id.twitch.tv/oauth2/authorize?${buildQuery({
        client_id: oauthConfig.twitchClientId,
        redirect_uri: oauthConfig.twitchRedirectUri,
        response_type: 'token',
        scope: 'user:read:email',
        force_verify: 'true',
        state
      })}`;
      showAuthNotice('Connexion en cours...');

      const popup = window.open(
        url,
        'redebut_twitch_oauth',
        'popup=yes,width=540,height=720,menubar=no,toolbar=no,location=yes,status=no,scrollbars=yes,resizable=yes'
      );

      if (popup) {
        popup.focus();
        return;
      }

      try {
        window.location.href = url;
      } catch (e) {
        window.location.assign(url);
      }
    }

    async function handleOAuthCallbackIfPresent() {
      const hash = window.location.hash.startsWith('#') ? window.location.hash.slice(1) : '';
      const search = new URLSearchParams(window.location.search);
      const hasQueryOAuth = search.has('code') || search.has('error');

      if (relayOAuthCallbackToOpenerIfNeeded(hash, hasQueryOAuth)) {
        return;
      }

      if (!hash && !hasQueryOAuth) {
        return;
      }
      await consumeOAuthCallbackPayload(hash, hasQueryOAuth);
    }

    supportMessages = [];

    function refreshText() {
      const typedMessage = textArea.value.trim();
      const displayName = isAuthenticated() ? authUser.name : 'Compte non connecte';
      if (!typedMessage) {
        textPreview.textContent = 'Aperçu de ton message...';
        return;
      }

      textPreview.textContent = `${typedMessage}\n- ${displayName}`;
    }

    function persistSupportMessages() {
      window.localStorage.setItem(supportMessagesStorageKey, JSON.stringify(supportMessages));

      if (supportMessagesChannel) {
        supportMessagesChannel.postMessage({
          type: 'messages-updated',
          messages: supportMessages
        });
      }
    }

    function filterMessagesForCurrentRound(messages) {
      if (!Array.isArray(messages)) {
        return [];
      }

      if (!Number.isFinite(messagesRoundStartMs) || messagesRoundStartMs <= 0) {
        return messages;
      }

      return messages.filter((entry) => {
        const createdAtMs = Number(entry && entry.createdAt);
        return Number.isFinite(createdAtMs) && createdAtMs >= messagesRoundStartMs;
      });
    }

    function ensureMessagesRoundStartMs() {
      if (Number.isFinite(messagesRoundStartMs) && messagesRoundStartMs > 0) {
        return;
      }

      const localTargetRaw = window.localStorage.getItem(countdownStorageKey);
      const localTargetMs = localTargetRaw ? new Date(localTargetRaw).getTime() : NaN;
      if (!Number.isFinite(localTargetMs) || localTargetMs <= 0) {
        return;
      }

      const computedRoundStartMs = localTargetMs - countdownDurationMs;
      if (!Number.isFinite(computedRoundStartMs) || computedRoundStartMs <= 0) {
        return;
      }

      messagesRoundStartMs = computedRoundStartMs;
      window.localStorage.setItem(messagesRoundStartStorageKey, String(messagesRoundStartMs));
    }

    async function pullSupportMessagesFromSupabase() {
      if (!isCloudSyncEnabled) {
        return;
      }

      ensureMessagesRoundStartMs();

      let rows = [];
      const hasRoundStart = Number.isFinite(messagesRoundStartMs) && messagesRoundStartMs > 0;
      if (!hasRoundStart) {
        // Preserve currently loaded messages until round start is available.
        renderSupportMessages();
        return;
      }
      const roundStartIso = hasRoundStart ? new Date(messagesRoundStartMs).toISOString() : '';

      if (supabaseClient) {
        let queryBuilder = supabaseClient
          .from(supabaseConfig.table)
          .select('name, provider, text, created_at');

        if (hasRoundStart) {
          queryBuilder = queryBuilder.gte('created_at', roundStartIso);
        }

        const { data, error } = await queryBuilder
          .order('created_at', { ascending: true })
          .limit(maxMessages);

        if (error) {
          throw error;
        }

        rows = Array.isArray(data) ? data : [];
      } else {
        let query = `?select=name,provider,text,created_at&order=created_at.asc&limit=${maxMessages}`;
        if (hasRoundStart) {
          query += `&created_at=gte.${encodeURIComponent(roundStartIso)}`;
        }
        const data = await supabaseRestRequest(`/rest/v1/${supabaseConfig.table}${query}`);
        rows = Array.isArray(data) ? data : [];
      }

      supportMessages = rows.map((row) => ({
            name: row.name || 'Compte',
            provider: row.provider || 'Compte',
            text: row.text || '',
            createdAt: row.created_at ? new Date(row.created_at).getTime() : Date.now()
          }));

      supportMessages = filterMessagesForCurrentRound(supportMessages);

      persistSupportMessages();
      renderSupportMessages();
    }

    async function setupRealtimeSupportMessages() {
      if (cloudDisabledForSession) {
        isRealtimeEnabled = false;
        isCloudSyncEnabled = false;
        return;
      }

      const hasSupabase = Boolean(window.supabase && window.supabase.createClient);
      const hasConfig = Boolean(supabaseConfig.url && supabaseConfig.anonKey);

      if (!hasConfig) {
        isRealtimeEnabled = false;
        isCloudSyncEnabled = false;
        showComposeNotice('Cloud non configure. Messages en mode local.');
        return;
      }

      isCloudSyncEnabled = true;

      if (!hasSupabase) {
        isRealtimeEnabled = false;
        supabaseClient = null;
        showComposeNotice('Mode cloud actif. Synchronisation commentaires active.');

        await pullSupportMessagesFromSupabase();

        if (!messagesSyncIntervalId) {
          messagesSyncIntervalId = window.setInterval(() => {
            pullSupportMessagesFromSupabase().catch(() => {
              // Keep latest successful state if polling fails.
            });
          }, syncPollMs);
        }

        return;
      }

      try {
        supabaseClient = window.supabase.createClient(supabaseConfig.url, supabaseConfig.anonKey);
        isRealtimeEnabled = true;
        isCloudSyncEnabled = true;
        showComposeNotice('Mode temps reel actif. Messages synchronises entre appareils.');

        await pullSupportMessagesFromSupabase();

        supabaseClient
          .channel(supabaseConfig.channel)
          .on(
            'postgres_changes',
            { event: '*', schema: 'public', table: supabaseConfig.table },
            async () => {
              try {
                await pullSupportMessagesFromSupabase();
              } catch (e) {
                // Keep current UI state if a live refresh fails.
              }
            }
          )
          .subscribe();

        if (!messagesSyncIntervalId) {
          messagesSyncIntervalId = window.setInterval(() => {
            if (!isRealtimeEnabled) {
              return;
            }

            pullSupportMessagesFromSupabase().catch(() => {
              // Keep latest successful state if polling fails.
            });
          }, syncPollMs);
        }

        document.addEventListener('visibilitychange', () => {
          if (document.visibilityState === 'visible' && isRealtimeEnabled) {
            pullSupportMessagesFromSupabase().catch(() => {
              // Ignore transient refresh errors when tab becomes visible.
            });
          }
        });

        window.addEventListener('online', () => {
          if (isRealtimeEnabled) {
            pullSupportMessagesFromSupabase().catch(() => {
              // Ignore transient network recovery errors.
            });
          }
        });
      } catch (e) {
        isRealtimeEnabled = false;
        supabaseClient = null;
        isCloudSyncEnabled = false;
        showComposeNotice('Realtime indisponible. Messages cloud via API REST.');

        // Keep cloud mode active through REST when websocket/realtime setup fails.
        isCloudSyncEnabled = true;
      }
    }

    async function pruneSupabaseMessagesIfNeeded() {
      if (!isCloudSyncEnabled) {
        return;
      }

      // Uses a DB function (SECURITY DEFINER) to prune safely without exposing broad delete rights to clients.
      if (supabaseClient) {
        await supabaseClient.rpc('prune_support_messages', { max_rows: maxMessages });
        return;
      }

      await supabaseRestRequest('/rest/v1/rpc/prune_support_messages', {
        method: 'POST',
        body: JSON.stringify({ max_rows: maxMessages })
      });
    }

    function getProviderLogoInfo(providerRaw) {
      const providerLabel = String(providerRaw || '').trim().toLowerCase();

      if (providerLabel === 'google') {
        return {
          label: 'Google',
          logoUrl: 'https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg'
        };
      }

      if (providerLabel === 'twitch') {
        return {
          label: 'Twitch',
          logoUrl: 'https://www.twitch.tv/favicon.ico'
        };
      }

      return {
        label: providerRaw || 'Compte',
        logoUrl: ''
      };
    }

    function renderSupportMessages() {
      messagesList.innerHTML = '';

      if (!supportMessages.length) {
        const empty = document.createElement('p');
        empty.className = 'empty-state';
        empty.textContent = 'Aucun message pour le moment. Sois la premiere personne a laisser un mot doux.';
        messagesList.appendChild(empty);
        return;
      }

      supportMessages
        .slice()
        .reverse()
        .forEach((entry) => {
          const item = document.createElement('article');
          item.className = 'message-item';

          const text = document.createElement('p');
          text.textContent = entry.text;

          const meta = document.createElement('p');
          meta.className = 'message-meta';
          const dateText = new Date(entry.createdAt).toLocaleString('fr-FR');

          const providerInfo = getProviderLogoInfo(entry.provider);
          const authorWrap = document.createElement('span');
          authorWrap.className = 'message-author';

          if (providerInfo.logoUrl) {
            const logo = document.createElement('img');
            logo.className = 'provider-logo';
            logo.src = providerInfo.logoUrl;
            logo.alt = providerInfo.label;
            logo.title = providerInfo.label;
            authorWrap.appendChild(logo);
          }

          const authorText = document.createElement('span');
          authorText.textContent = entry.name || 'Compte';
          authorWrap.appendChild(authorText);

          const dateNode = document.createElement('span');
          dateNode.textContent = `- ${dateText}`;

          meta.appendChild(authorWrap);
          meta.appendChild(dateNode);

          item.appendChild(text);
          item.appendChild(meta);
          messagesList.appendChild(item);
        });
    }

    async function publishSupportMessage() {
      const messageText = textArea.value.trim();
      if (!isAuthenticated()) {
        showComposeNotice('Connecte-toi pour publier un message.');
        return;
      }

      if (!messageText) {
        showComposeNotice('Ecris un message avant de publier.');
        textArea.focus();
        return;
      }

      const now = Date.now();
      const lastPublishAt = Number(window.localStorage.getItem(lastPublishStorageKey) || '0');
      const remainingMs = publishCooldownMs - (now - lastPublishAt);
      if (remainingMs > 0) {
        const remainingSeconds = Math.ceil(remainingMs / 1000);
        showComposeNotice(`Patiente encore ${remainingSeconds}s avant de republier.`);
        return;
      }

      publishMessageBtn.disabled = true;
      showComposeNotice('Publication en cours...');

      if (isCloudSyncEnabled) {
        try {
          let publishedInCloud = false;

          if (supabaseClient) {
            const { error } = await supabaseClient
              .from(supabaseConfig.table)
              .insert({
                name: authUser.name,
                provider: authUser.provider,
                text: messageText
              });

            if (!error) {
              publishedInCloud = true;
            }
          }

          if (!publishedInCloud) {
            await supabaseRestRequest(`/rest/v1/${supabaseConfig.table}`, {
              method: 'POST',
              headers: {
                Prefer: 'return=minimal'
              },
              body: JSON.stringify({
                name: authUser.name,
                provider: authUser.provider,
                text: messageText
              })
            });

            publishedInCloud = true;
          }

          if (!publishedInCloud) {
            throw new Error('cloud_publish_failed');
          }

          window.localStorage.setItem(lastPublishStorageKey, String(now));
          try {
            await pruneSupabaseMessagesIfNeeded();
          } catch (e) {
            // Do not fail message publishing if pruning is unavailable.
          }

          textArea.value = '';
          refreshText();
          await pullSupportMessagesFromSupabase();
          showComposeNotice('Message publie et synchronise.');
          return;
        } catch (e) {
          isCloudSyncEnabled = false;
          showComposeNotice('Cloud indisponible. Message non publie, reessaie.');
          publishMessageBtn.disabled = !isAuthenticated();
          return;
        }
      }

      if (hasCloudConfig) {
        showComposeNotice('Cloud configure: envoi local bloque pour garder Google/Twitch synchronises.');
        publishMessageBtn.disabled = !isAuthenticated();
        return;
      }

      supportMessages.push({
        name: authUser.name,
        provider: authUser.provider,
        text: messageText,
        createdAt: Date.now()
      });

      supportMessages = supportMessages.slice(-maxMessages);
      persistSupportMessages();
      window.localStorage.setItem(lastPublishStorageKey, String(now));
      textArea.value = '';
      refreshText();
      renderSupportMessages();
      showComposeNotice('Message publie en mode local.');
      publishMessageBtn.disabled = !isAuthenticated();
    }

    window.addEventListener('storage', (event) => {
      if (event.key !== supportMessagesStorageKey) {
        return;
      }

      try {
        const nextMessages = event.newValue ? JSON.parse(event.newValue) : [];
        supportMessages = filterMessagesForCurrentRound(Array.isArray(nextMessages) ? nextMessages : []);
      } catch (e) {
        supportMessages = [];
      }

      renderSupportMessages();
    });

    if (supportMessagesChannel) {
      supportMessagesChannel.onmessage = (event) => {
        const payload = event.data;
        if (!payload || payload.type !== 'messages-updated') {
          return;
        }

        supportMessages = filterMessagesForCurrentRound(Array.isArray(payload.messages) ? payload.messages : []);
        renderSupportMessages();
      };
    }

    textArea.addEventListener('input', refreshText);
    publishMessageBtn.addEventListener('click', () => {
      publishSupportMessage().finally(() => {
        publishMessageBtn.disabled = !isAuthenticated();
      });
    });
    textArea.addEventListener('keydown', (event) => {
      if ((event.ctrlKey || event.metaKey) && event.key === 'Enter') {
        event.preventDefault();
        publishSupportMessage().finally(() => {
          publishMessageBtn.disabled = !isAuthenticated();
        });
      }
    });

    (async () => {
      // Render core UI immediately so auth buttons are visible even if async setup fails.
      updateAuthUi();
      refreshText();
      renderSupportMessages();

      try {
        await loadSharedCountdownConfig();
      } catch (e) {
        // Keep previously known countdown state on transient bootstrap errors.
      }

      canAutoRedirect = true;
      updateCountdown();

      try {
        await handleOAuthCallbackIfPresent();
      } catch (e) {
        showAuthNotice('Retour de connexion detecte mais incomplet.');
      }

      try {
        await setupRealtimeSupportMessages();
      } catch (e) {
        showComposeNotice('Cloud indisponible. La synchro des messages est indisponible.');
      }

      updateAuthUi();
      refreshText();
      renderSupportMessages();
    })();

    const bgImg = document.getElementById('bgImg');
    bgImg.style.backgroundImage = 'none';

    // Deter common browser download actions on MP4 elements.
    document.querySelectorAll('video').forEach((videoEl) => {
      videoEl.addEventListener('contextmenu', (event) => {
        event.preventDefault();
      });

      videoEl.setAttribute('controlsList', 'nodownload noplaybackrate nofullscreen');
      videoEl.setAttribute('disablePictureInPicture', 'true');
      videoEl.setAttribute('disableRemotePlayback', 'true');

      ['dragstart', 'copy', 'cut'].forEach((blockedEvent) => {
        videoEl.addEventListener(blockedEvent, (event) => {
          event.preventDefault();
        });
      });

      videoEl.addEventListener('keydown', (event) => {
        const key = (event.key || '').toLowerCase();
        if ((event.ctrlKey || event.metaKey) && (key === 's' || key === 'u' || key === 'c')) {
          event.preventDefault();
        }
      });
    });

    let audioContext;
    let masterGain;

    function startAudio() {
      if (audioContext) return;

      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      if (!AudioCtx) return;

      audioContext = new AudioCtx();
      masterGain = audioContext.createGain();
      masterGain.gain.value = 0.03;
      masterGain.connect(audioContext.destination);

      const osc1 = audioContext.createOscillator();
      const osc2 = audioContext.createOscillator();
      const gain1 = audioContext.createGain();
      const gain2 = audioContext.createGain();
      const lfo = audioContext.createOscillator();
      const lfoGain = audioContext.createGain();

      osc1.type = 'sine';
      osc1.frequency.value = 220;
      osc2.type = 'triangle';
      osc2.frequency.value = 330;
      gain1.gain.value = 0.012;
      gain2.gain.value = 0.010;
      lfo.frequency.value = 0.15;
      lfoGain.gain.value = 20;

      lfo.connect(lfoGain);
      lfoGain.connect(osc1.frequency);
      lfoGain.connect(osc2.frequency);

      osc1.connect(gain1);
      osc2.connect(gain2);
      gain1.connect(masterGain);
      gain2.connect(masterGain);

      lfo.start();
      osc1.start();
      osc2.start();
    }

    document.addEventListener('click', startAudio, { once: true });
    document.addEventListener('keydown', startAudio, { once: true });
    window.addEventListener('pointerdown', startAudio, { once: true });
    startAudio();

  </script>
</body>
</html>
