<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Un nouveau chapitre</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f8fafc;
      color: #222;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      max-width: 980px;
      width: 100%;
      background: white;
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
    }

    h1 {
      margin: 0 0 12px;
      color: #7c3aed;
      font-size: 32px;
      text-align: center;
    }

    .intro {
      margin: 0 0 24px;
      color: #4b5563;
      line-height: 1.7;
      font-size: 16px;
      text-align: center;
    }

    .countdown {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .time-box {
      min-width: 90px;
      background: #f5f3ff;
      border: 1px solid #ddd6fe;
      border-radius: 12px;
      padding: 12px 10px;
      text-align: center;
    }

    .time-box strong {
      display: block;
      font-size: 24px;
      color: #7c3aed;
    }

    .time-box span {
      font-size: 12px;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .message {
      margin: 0 0 24px;
      padding: 16px 18px;
      border-radius: 14px;
      background: #faf5ff;
      border: 1px solid #e9d5ff;
      color: #6b21a8;
      text-align: center;
      font-size: 16px;
      line-height: 1.7;
    }

    .content-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 8px;
    }

    .panel {
      background: #faf7ff;
      border: 1px solid #ede9fe;
      border-radius: 16px;
      padding: 16px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 8px;
      color: #4338ca;
    }

    textarea,
    input {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #d8b4fe;
      border-radius: 10px;
      padding: 10px 12px;
      font: inherit;
      resize: vertical;
      min-height: 100px;
    }

    .preview {
      margin-top: 10px;
      padding: 12px;
      border-radius: 10px;
      background: white;
      color: #374151;
      line-height: 1.6;
      min-height: 80px;
      border: 1px dashed #c4b5fd;
      white-space: pre-wrap;
    }

    .video-frame {
      margin-top: 10px;
      min-height: 220px;
      border-radius: 12px;
      overflow: hidden;
      background: #e9d5ff;
      display: grid;
      place-items: center;
      color: #6b21a8;
      padding: 12px;
      text-align: center;
    }

    .video-card {
      width: 100%;
      background: white;
      border-radius: 12px;
      padding: 12px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.08);
    }

    .video-card p {
      margin: 0 0 8px;
      font-weight: bold;
      color: #6d28d9;
    }

    .video-card video {
      width: 100%;
      border-radius: 10px;
      display: block;
      background: #000;
    }

    .video-frame iframe {
      width: 100%;
      height: 100%;
      min-height: 220px;
      border: 0;
      border-radius: 12px;
    }

    .btn {
      display: inline-block;
      margin-top: 18px;
      text-decoration: none;
      padding: 12px 16px;
      border-radius: 999px;
      font-weight: bold;
      background: #ec4899;
      color: white;
    }

    .btn:hover {
      background: #db2777;
    }

    .btn-disabled {
      pointer-events: none;
      opacity: 0.7;
      cursor: default;
    }

    .bg-img {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 0.8;
      pointer-events: none;
      overflow: hidden;
    }

    .bg-img::before,
    .bg-img::after {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      width: 22%;
      background-image: url('assets/sakura Flower.jpg');
      background-size: cover;
      background-position: center;
      filter: saturate(1) contrast(1) opacity(0.95);
      pointer-events: none;
    }

    .bg-img::before {
      left: 0;
    }

    .bg-img::after {
      right: 0;
    }

    .sakura {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.95) 0 4px, transparent 5px),
        radial-gradient(circle at 75% 25%, rgba(255,182,193,0.8) 0 3px, transparent 4px),
        radial-gradient(circle at 40% 75%, rgba(255,255,255,0.9) 0 3px, transparent 4px);
      background-size: 220px 220px, 180px 180px, 200px 200px;
      opacity: 0.9;
      z-index: 1;
      mix-blend-mode: screen;
    }

    .card {
      position: relative;
      z-index: 2;
    }

  </style>
</head>
<body>
  <div id="bgImg" class="bg-img" aria-hidden="true"></div>
  <div class="sakura"></div>
  <div class="card">
    <h1>Un nouveau chapitre</h1>
    <p class="intro">Merci pour votre soutien et votre présence.</p>
    <p class="message">Merci pour votre présence.<br>Un nouveau chapitre s’ouvre avec tout mon amour.</p>

    <div class="countdown" aria-label="Compte à rebours">
      <div class="time-box"><strong id="days">00</strong><span>Jours</span></div>
      <div class="time-box"><strong id="hours">00</strong><span>Heures</span></div>
      <div class="time-box"><strong id="minutes">00</strong><span>Minutes</span></div>
      <div class="time-box"><strong id="seconds">00</strong><span>Secondes</span></div>
    </div>

    <div class="content-grid">
      <div class="panel">
        <label for="customText">Message de remerciement</label>
        <textarea id="customText" placeholder="Écris ici ton message de remerciement">Merci pour votre soutien et votre présence.</textarea>
        <div id="textPreview" class="preview"></div>
      </div>

      <div class="panel">
        <div id="videoFrame" class="video-frame">
          <div class="video-card">
            <p>Mon aventure</p>
            <video controls preload="metadata" playsinline>
              <source src="tout%20les%20models.mp4" type="video/mp4" />
              Votre navigateur ne prend pas en charge la lecture de vidéos.
            </video>
          </div>
        </div>
        <!-- background change control removed (default sakura background) -->
      </div>
    </div>

    <a id="nextLink" href="Redebut.html" class="btn btn-disabled">Voir la page suivante</a>
  </div>

  <script>
    const countdownStorageKey = 'redebut-countdown-target-date';
    const storedTargetDate = window.localStorage.getItem(countdownStorageKey);
    const targetDate = storedTargetDate ? new Date(storedTargetDate) : new Date(Date.now() + 60 * 1000);

    if (!storedTargetDate) {
      window.localStorage.setItem(countdownStorageKey, targetDate.toISOString());
    }

    const nextLink = document.getElementById('nextLink');

    function updateCountdown() {
      const now = new Date().getTime();
      const distance = targetDate - now;

      if (distance <= 0) {
        document.getElementById('days').textContent = '00';
        document.getElementById('hours').textContent = '00';
        document.getElementById('minutes').textContent = '00';
        document.getElementById('seconds').textContent = '00';
        nextLink.classList.remove('btn-disabled');
        nextLink.removeAttribute('aria-disabled');

        if (!window.__redirected) {
          window.__redirected = true;
          window.location.href = nextLink.getAttribute('href');
        }
        return;
      }

      nextLink.classList.add('btn-disabled');
      nextLink.setAttribute('aria-disabled', 'true');

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      document.getElementById('days').textContent = String(days).padStart(2, '0');
      document.getElementById('hours').textContent = String(hours).padStart(2, '0');
      document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
      document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);

    const textArea = document.getElementById('customText');
    const textPreview = document.getElementById('textPreview');

    function refreshText() {
      textPreview.textContent = textArea.value.trim() || 'Merci pour votre soutien.';
    }

    textArea.addEventListener('input', refreshText);
    refreshText();

    // video section is rendered directly with the local video file

    // default background is handled by CSS with side panels only
    const bgImg = document.getElementById('bgImg');
    bgImg.style.backgroundImage = 'none';

    let audioContext;
    let masterGain;

    function startAudio() {
      if (audioContext) return;

      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      if (!AudioCtx) return;

      audioContext = new AudioCtx();
      masterGain = audioContext.createGain();
      masterGain.gain.value = 0.03;
      masterGain.connect(audioContext.destination);

      const osc1 = audioContext.createOscillator();
      const osc2 = audioContext.createOscillator();
      const gain1 = audioContext.createGain();
      const gain2 = audioContext.createGain();
      const lfo = audioContext.createOscillator();
      const lfoGain = audioContext.createGain();

      osc1.type = 'sine';
      osc1.frequency.value = 220;
      osc2.type = 'triangle';
      osc2.frequency.value = 330;
      gain1.gain.value = 0.012;
      gain2.gain.value = 0.010;
      lfo.frequency.value = 0.15;
      lfoGain.gain.value = 20;

      lfo.connect(lfoGain);
      lfoGain.connect(osc1.frequency);
      lfoGain.connect(osc2.frequency);

      osc1.connect(gain1);
      osc2.connect(gain2);
      gain1.connect(masterGain);
      gain2.connect(masterGain);

      lfo.start();
      osc1.start();
      osc2.start();
    }

    document.addEventListener('click', startAudio, { once: true });
    document.addEventListener('keydown', startAudio, { once: true });
    window.addEventListener('pointerdown', startAudio, { once: true });
    startAudio();

  </script>
</body>
</html>
