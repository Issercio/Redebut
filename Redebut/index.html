<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirection...</title>
  <link rel="icon" type="image/jpeg" href="./Apres%20compteur/assets/Kitsune_Favicon.jpg" />
  <meta http-equiv="refresh" content="0; url=./avant-compteur.html" />
  <script>
    function setEntryFavicon(href) {
      const favicon = document.querySelector("link[rel='icon']");
      if (favicon) {
        favicon.href = href || './Apres%20compteur/assets/Kitsune_Favicon.jpg';
      }
    }
    setEntryFavicon('./Apres%20compteur/assets/Kitsune_Favicon.jpg');

    const hashPayload = window.location.hash.startsWith('#') ? window.location.hash.slice(1) : '';
    const queryPayload = new URLSearchParams(window.location.search);
    const hasOAuthPayload = hashPayload.includes('access_token=')
      || hashPayload.includes('error=')
      || queryPayload.has('code')
      || queryPayload.has('error');

    const redirectUrl = hasOAuthPayload
      ? `./avant-compteur.html${window.location.search}${window.location.hash}`
      : `./avant-compteur.html?v=${Date.now()}`;
    window.location.replace(redirectUrl);
  </script>
</head>
<body>
  <p>Redirection vers la page principale...</p>
  <p><a href="./avant-compteur.html">Ouvrir avant-compteur.html</a></p>
</body>
</html>
