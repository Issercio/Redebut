<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ma nouvelle aventure</title>
  <link rel="icon" type="image/jpeg" href="./assets/Kitsune_Favicon.jpg" />
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(135deg, #f8f5ff 0%, #eef2ff 45%, #fdf2f8 100%);
      color: #222;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .page {
      width: min(980px, 100%);
      background: rgba(255,255,255,0.95);
      border-radius: 24px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.12);
      padding: 24px;
      border: 1px solid rgba(124, 58, 237, 0.12);
    }

    h1 {
      margin: 0 0 12px;
      color: #7c3aed;
      font-size: 30px;
    }

    .intro {
      margin: 0 0 18px;
      color: #4b5563;
      line-height: 1.7;
    }

    .video-box {
      background: #faf7ff;
      border: 1px solid #ece7ff;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 18px;
    }

    video {
      width: 100%;
      border-radius: 12px;
      display: block;
      background: #000;
    }

    .thanks {
      background: #fff7fb;
      border: 1px solid #f3d6ec;
      border-left: 4px solid #ec4899;
      border-radius: 14px;
      padding: 14px 16px;
      color: #4b5563;
      line-height: 1.7;
    }

    .back-link {
      display: inline-block;
      margin-top: 16px;
      text-decoration: none;
      color: #4338ca;
      font-weight: 700;
    }

    .don-link {
      display: inline-block;
      margin-top: 12px;
      margin-right: 12px;
      padding: 10px 16px;
      border-radius: 999px;
      background: linear-gradient(135deg, #ec4899, #db2777);
      color: white;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>Ma nouvelle aventure</h1>
    <p class="intro">Découvre mon nouveau modèle: une version plus expressive, plus vivante, et pensée pour offrir une meilleure expérience en stream.</p>

    <div class="video-box">
      <video controls preload="metadata" playsinline controlslist="nodownload noplaybackrate" disablepictureinpicture disableremoteplayback oncontextmenu="return false;">
        <source src="tout%20les%20models.mp4" type="video/mp4" />
        Votre navigateur ne prend pas en charge la lecture de vidéos.
      </video>
    </div>

    <div class="thanks">
      <strong>Merci pour votre soutien</strong><br />
      Chaque moment partagé avec vous compte énormément pour moi.
    </div>

    <a class="don-link" href="https://ko-fi.com/princessekitsune" target="_blank" rel="noopener noreferrer">Faire un don</a>
    <a class="back-link" href="Redebut.html">← Voir les donation goals</a>
  </div>

  <script>
    // Deter common browser download actions on MP4 elements.
    document.querySelectorAll('video').forEach((videoEl) => {
      videoEl.addEventListener('contextmenu', (event) => {
        event.preventDefault();
      });

      videoEl.addEventListener('keydown', (event) => {
        const key = (event.key || '').toLowerCase();
        if ((event.ctrlKey || event.metaKey) && (key === 's' || key === 'u')) {
          event.preventDefault();
        }
      });
    });
  </script>
</body>
</html>
