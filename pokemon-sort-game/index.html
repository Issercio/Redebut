<!DOCTYPE html>
<html lang="fr">

<head>

<title>Pokémon Sort Game</title>

<link rel="stylesheet" href="style.css">

<body>

        <p>

        <div class="main-menu">



            <a href="pages/jouer.html">

                <span>

                </span>

            <a href="pages/classement.html">

                🏆

                <span>
                    Classement
                </span>

            </a>




            <a href="pages/regles.html">

                📖

                <span>
                    Règles
                </span>

            </a>




            <a href="pages/credits.html">

                ⭐

                <span>
                    Crédits
                </span>

            </a>



        </div>



    </div>



</div>







<script>


document.addEventListener(
"click",
()=>{


document
.getElementById("music")
.play();


},
{
once:true
}

);


</script>

</html>
